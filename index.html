<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSL CSR Decoder & Analyzer</title>
  <meta name="description" content="SSL証明書署名要求 (CSR) の内容を安全にブラウザ上でパースし、詳細情報を可視化するツールです。">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- node-forge CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/forge/1.3.1/forge.min.js" referrerpolicy="no-referrer"></script>
</head>
<body>
  <div class="bg-glow"></div>
  
  <div class="app-container">
    <header class="app-header">
      <div class="logo">
        <span class="icon">🔒</span>
        <h1>CSR Decoder</h1>
      </div>
      <p class="subtitle">SSL/TLS 証明書署名要求 (CSR) のデコードと解析</p>
    </header>

    <main class="app-main">
      <!-- 入力セクション -->
      <section class="card input-card">
        <div class="card-header">
          <h2>CSR (PEM形式) を入力</h2>
          <div class="action-buttons-mini">
            <button id="btn-demo" class="btn btn-secondary btn-sm" title="テスト用のCSRデータを入力します">
              デモデータをロード
            </button>
            <button id="btn-clear" class="btn btn-tertiary btn-sm" title="入力をクリアします">
              クリア
            </button>
          </div>
        </div>
        
        <div class="textarea-wrapper">
          <textarea id="csr-input" placeholder="-----BEGIN CERTIFICATE REQUEST-----&#10;ここにCSRのPEMデータを貼り付けてください...&#10;-----END CERTIFICATE REQUEST-----" spellcheck="false"></textarea>
        </div>

        <button id="btn-analyze" class="btn btn-primary btn-block">
          <span class="btn-text">CSRを解析する</span>
          <span class="btn-icon">⚡</span>
        </button>
      </section>

      <!-- エラー表示領域 -->
      <div id="error-container" class="error-alert hidden">
        <span class="error-icon">⚠️</span>
        <span id="error-message" class="error-text">エラーが発生しました。</span>
      </div>

      <!-- 解析結果セクション -->
      <section id="result-container" class="card result-card hidden">
        <div class="card-header border-bottom">
          <h2>解析結果</h2>
          <span id="validation-badge" class="badge">検証中</span>
        </div>

        <!-- 概要ステータス -->
        <div class="status-grid">
          <div class="status-item">
            <span class="status-label">署名の整合性</span>
            <span id="stat-signature" class="status-value">-</span>
          </div>
          <div class="status-item">
            <span class="status-label">鍵アルゴリズム</span>
            <span id="stat-algorithm" class="status-value">-</span>
          </div>
          <div class="status-item">
            <span class="status-label">公開鍵サイズ</span>
            <span id="stat-key-size" class="status-value">-</span>
          </div>
        </div>

        <!-- Subject 情報 -->
        <div class="result-section">
          <h3>申請者情報 (Subject)</h3>
          <div class="table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>属性 (OID)</th>
                  <th>値</th>
                  <th>説明</th>
                </tr>
              </thead>
              <tbody id="subject-table-body">
                <!-- 動的に生成されます -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- 拡張属性 (SANs等) -->
        <div id="extensions-section" class="result-section hidden">
          <h3>拡張情報 (Extensions)</h3>
          <div id="extensions-list" class="extensions-list">
            <!-- 動的に生成されます -->
          </div>
        </div>

        <!-- 公開鍵詳細 (PEM) -->
        <div class="result-section">
          <details class="collapsible-details">
            <summary>公開鍵の技術詳細 (PEM / Modulus)</summary>
            <div class="details-content">
              <pre><code id="public-key-pem" class="code-block"></code></pre>
            </div>
          </details>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p>解析はすべてブラウザ上で安全に行われ、データがサーバーに送信されることはありません。</p>
    </footer>
  </div>

  <!-- Application Logic -->
  <script src="app.js"></script>
</body>
</html>
